name: App CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
    
      - name: Install mise
        uses: jdx/mise-action@6d1e696aa24c1aa1bcc1adea0212707c71ab78a8

      - name: Tuist Install
        shell: bash
        run: tuist install

      - name: Tuist Generate
        shell: bash
        run: tuist generate

      - name: Tuist Build
        shell: bash
        run: tuist build
