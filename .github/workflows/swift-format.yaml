---
name: "swift-format"

"on":
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

jobs:
  SwiftFormat:
    runs-on: "macos-latest"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"

      - name: "Run swift-format"
        run: "xcrun swift-format lint -r ."
